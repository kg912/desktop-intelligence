  <circle cx="256" cy="256" r="204" fill="url(#sphereCore)" />
  <circle cx="256" cy="256" r="204" fill="url(#rimGlow)" />
  <circle cx="256" cy="256" r="204" fill="#06030f" fill-opacity="0.25" />
  <circle cx="256" cy="256" r="196" fill="none" stroke="#440000" stroke-width="3" stroke-opacity="0.5" />
  <path d="M 130 120 A 204 204 0 0 1 390 110" fill="none" stroke="#ffffff" stroke-width="1.5" stroke-opacity="0.18" stroke-linecap="round" />
