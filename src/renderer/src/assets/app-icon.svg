<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="sphereCore" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff2222" stop-opacity="0.8" />
      <stop offset="35%" stop-color="#880000" stop-opacity="0.6" />
      <stop offset="75%" stop-color="#1e0000" stop-opacity="0.45" />
      <stop offset="100%" stop-color="#0a0000" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="rimGlow" cx="50%" cy="50%" r="50%">
