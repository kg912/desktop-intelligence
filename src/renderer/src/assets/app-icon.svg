  <path d="M 100 160 A 215 215 0 0 1 412 160" fill="none" stroke="url(#ringSheen)" stroke-width="14" stroke-linecap="round" />
  <circle cx="256" cy="256" r="204" fill="none" stroke="#000000" stroke-width="6" stroke-opacity="0.6" />
